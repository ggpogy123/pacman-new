<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-man(?)</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class ="hud_disp">
        <div>Score: <span id="score">0</span></div>
        <div>Phase: <span id="phase">0</span></div>
        <div>Time: <span id="time">0</span>s</div>
    </div>

    <div id="container">
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <div id="gameover">
        <h2>GAME OVER</h2>
        <p> Final Score: <span id = "final_score">0</span></p>
        <p> Time: <span id = "final_time">0</span></p>
        <button onclick="window.resetGame()">Try Again</button>
    </div>

    <div id="instructions">
        <p>Phase 1 (Normal mode): This is normal pac man</p>
        <p>Phase 2 (Twist mode): Gravity pulls you down! Use the arrow keys to rotate the map.</p>
        <i>The game cycles between these two phases every 30 seconds!</i>
    </div>
    <script src="game.js"></script>
</body>
</html>
